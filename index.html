<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>KAITO QUIZ</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fascinate+Inline&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

  <body>
    <h1>HOW KAITO R U ??</h1>
    <hr />
    <!-- Movie Question -->
    <form id="aisu-form">
      <label>
        do you like icecream?
        <select id="aisu-answer">
          <option value="aisu1">YESSSSSSSOMGGG</option>
          <option value="aisu2">yea</option>
          <option value="aisu3">ehhh</option>
          <option value="aisu4">nahh</option>
          <option value="aisu5">EWWW *THROWS UP*</option>
        </select>
      </label>
      <button type="submit">KAITO APPROVED?</button>
    </form>
    <div id="aisu-result">
      <p id="aisu-text"></p>
      <img id="aisu-img">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="born-form">
      <label>
        what season were u born in?
        <select id="born-answer">
          <option value="born1">spring</option>
          <option value="born2">summer</option>
          <option value="born3">fall</option>
          <option value="born4">winter</option>
        </select>
      </label>
      <button type="submit">KAITO TOO?</button>
    </form>
    <div id="born-result">
      <p id="born-text"></p>
      <img id="born-img">
    </div>
    <hr />

    <form id="sing-form">
      <label>
        do you like to sing?
        <select id="sing-answer">
          <option value="sing1">yea!!</option>
          <option value="sing2">ehhh</option>
          <option value="sing3">nah</option>
        </select>
      </label>
      <button type="submit">KAITO TOO?</button>
    </form>
    <div id="sing-result">
      <p id="sing-text"></p>
      <img id="sing-img">
    </div>

    <hr />

    <form id="dance-form">
      <label>
        how about dancing?
        <select id="dance-answer">
          <option value="dance1">YEA!! *does a little jig*</option>
          <option value="dance2">im not good at it</option>
          <option value="dance3">ehhh</option>
          <option value="dance4">NO 🤬</option>
        </select>
      </label>
      <button type="submit">KAITO TOO?</button>
    </form>
    <div id="dance-result">
      <p id="dance-text"></p>
      <img id="dance-img">
    </div>
    <hr />

    <form id="music-form">
      <label>
        fave genre of music? :D
        <select id="music-answer">
          <option value="music1">pop</option>
          <option value="music2">rock</option>
          <option value="music3">r&b</option>
          <option value="music4">jazz</option>
          <option value="music5">latin</option>
          <option value="music6">hip-hop</option>
          <option value="music7">country</option>
          <option value="music8">edm</option>
          <option value="music9">something more niche!!</option>
          <option value="music10">can't choose...</option>
          <option value="music11">EVERYTHING!!!</option>
        </select>
      </label>
      <button type="submit">KAITO TOO?</button>
    </form>
    <div id="music-result">
      <p id="music-text"></p>
      <img id="music-img">
    </div>


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      $("#aisu-result").hide();
      $("#born-result").hide();
      $("#sing-result").hide();
      $("#dance-result").hide();
      $("#music-result").hide();

      //========================Movie Question jQuery Code
      $("#aisu-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#aisu-answer");
        var answer = $answer.val();

        $("#aisu-result").fadeIn(1000);

        if (answer === "aisu1") {
          $("#aisu-text").text("OMGMGMGMGMGMGMGMMGMGMMGMGMGMGMGMGMGMG U R JUST LIKE KAITO FR OMG WOWWW");
          $("#aisu-img").attr("src","https://media1.tenor.com/m/3-K_WpNGubQAAAAC/kaito-vocaloid.gif").animate({
          width: "400px"}, 1000);
        } 

        if (answer === "aisu2") {
          $("#aisu-text").text("yayyy!!! kaito LOVES icecream!!!!!!!!! probably a bit more than u do though! XD");
          $("#aisu-img").attr("src","https://media.tenor.com/WJtUix3cQyMAAAAi/kaito-vocaloid.gif").animate({
          width: "400px"
        }, 1000);
        }

        if (answer === "aisu3") {
          $("#aisu-text").text("that's okay!! to each their own");
          $("#aisu-img").attr("src","https://media.tenor.com/cf3hKlFEeVsAAAAi/kaito-ball-ball.gif").animate({
          width: "400px"
        }, 1000);
        }

        if (answer === "aisu4") {
          $("#aisu-text").text("oh.... no i mean ... that's fine i guess...");
          $("#aisu-img").attr("src","https://media1.tenor.com/m/_0QwTDpTyFMAAAAd/kaito-kaito-dayo.gif").animate({
          width: "400px"
        }, 1000);
        }

        if (answer === "aisu5") {
          $("#aisu-text").text("..oh,h,,, oh,,, oh ok,,,");
          $("#aisu-img").attr("src","https://media.tenor.com/dbh5MoNKvE0AAAAi/anime-boy.gif").animate({
          width: "400px"
        }, 1000);
        }
      });

      //=======================Book Question jQuery Code
      $("#born-form").on("submit", function (event) {
        event.preventDefault();

        $("#born-result").fadeIn(1000);

        var $answer = $("#born-answer");
        var answer = $answer.val();

        if (answer === "born4") {
          $("#born-text").text("OMGGGGG KAITO TOO OGMMGOMGOM KAITO'S TWIN");
           $("#born-img").attr("src", "https://i.ytimg.com/vi/SUXQ7L1D2Dw/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBgpTifEgJOBYjXW7Ty6xbzsgdlhw");
        } 
        else {
          $("#born-text").text("a lovely season!!! not KAITO's though!");
        }

        if (answer === "born1") {
          $("#born-img").attr("src", "https://static.wikia.nocookie.net/projectsekai/images/c/c0/Happy_Anniversary%21%21_%28KAITO%29.png/revision/latest/scale-to-width-down/1000?cb=20220216220729");
        }

        if (answer === "born2") {
          $("#born-img").attr("src", "https://static.wikia.nocookie.net/projectsekai/images/d/d1/Trust_In_Your_Acts_Of_Support_T.png/revision/latest/scale-to-width-down/1000?cb=20230520030028");
        }

        if (answer === "born3") {
          $("#born-img").attr("src", "https://static.wikia.nocookie.net/projectsekai/images/3/39/A_Curious_Rascal_T.png/revision/latest/scale-to-width-down/1000?cb=20240330042743");
        }
      });


      $("#sing-form").on("submit", function (event) {
        event.preventDefault();

        $("#sing-result").fadeIn(1000);

        var $answer = $("#sing-answer");
        var answer = $answer.val();

        if (answer === "sing1") {
          $("#sing-text").text("OMGGGGG U R JUST LIKE KAITO!!!!!!!!!");
           $("#sing-img").attr("src", "https://i.ytimg.com/vi/SUXQ7L1D2Dw/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBgpTifEgJOBYjXW7Ty6xbzsgdlhw");
        } 
        else {
          $("#sing-text").text("that's okay!! im sure ur AMAZING at whatever u ARE passionate about!!");
        }

        if (answer === "sing1") {
          $("#sing-img").attr("src", "divasinging.jpeg");
        }

        else {
          $("#sing-img").attr("src", "https://media1.tenor.com/m/re2boVu0UakAAAAd/kaito-vocaloid.gif");
        }
      });


      $("#dance-form").on("submit", function (event) {
        event.preventDefault();

        $("#dance-result").fadeIn(1000);

        var $answer = $("#dance-answer");
        var answer = $answer.val();

        if (answer === "dance1") {
          $("#dance-text").text("KAITO IS THAT YOU????!??! OMG!!");
          $("#dance-img").attr("src", "https://media1.tenor.com/m/0Wic0MnzN2sAAAAC/kaito-vocaloid.gif");
        } 
        
        if (answer === "dance2") {
           $("#dance-text").text("thats totally fine !! what matters is having fun !!! 💙");
          $("#dance-img").attr("src", "NOKUHASHI.jpg");
        }

       if (answer === "dance3" && "dance4") {
          $("#dance-text").text("that's totally chill, im sure ur super talented at something else!!! 💙");
          $("#dance-img").attr("src", "XDPIISU.png");
        } 
      });

      $("#music-form").on("submit", function (event) {
        event.preventDefault();

        $("#music-result").fadeIn(1000);
        $("#music-img").attr("src", "https://static.wikitide.net/projectsekaiwiki/1/19/KAITO_19_gacha_cutout.png").animate({
          width: "400px"}, 1000);

        var $answer = $("#music-answer");
        var answer = $answer.val();

        
        if (answer === "music9") {
          $("#music-text").text("sry for not including it, the list was already long... but anyway i bet it's awesome and that KAITO loves it too!!!!");
        } 

        if (answer === "music10") {
          $("#music-text").text("that's real XDDDD");
        } 
        
        if (answer === "music11") {
           $("#music-text").text("OMG U R LITERALLYYYYY KAITO!!!!!!!!! 💙💙💙💙💙💙💙");
        }

       if (answer === "music1" && "music2" && "music3" && "music4" && "music5" && "music6" && "music8") {
          $("#music-text").text("kaito loves that too!!!! not the most kaito-y answer though...");
        } 
      });
      
    </script>
  </body>
